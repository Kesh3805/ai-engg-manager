version: '3.9'
services:
  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=aiem
      - POSTGRES_PASSWORD=aiem
      - POSTGRES_DB=aiem
    ports: ['55432:5432'] # 55432 on host — avoids collision with native Postgres clusters on 5432/5433
    volumes: ['pgdata:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aiem -d aiem']
      interval: 10s
      timeout: 3s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports: ['9200:9200']
    volumes: ['esdata:/usr/share/elasticsearch/data']
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:9200/_cluster/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  # BullMQ workers with pinned gitleaks/semgrep (plan 2b-15). Build context is
  # the repo root so workspace packages are available to the image.
  queue-workers:
    build:
      context: .
      dockerfile: apps/queue-workers/Dockerfile
    profiles: ['workers'] # opt-in: `docker compose --profile workers up`
    environment:
      - DATABASE_URL=postgres://aiem:aiem@postgres:5432/aiem
      - REDIS_URL=redis://redis:6379
      - GIT_CLONES_DIR=/data/git-clones
      - GIT_LOCKS_DIR=/data/git-locks
    volumes:
      - gitclones:/data/git-clones
      - gitlocks:/data/git-locks
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  esdata:
  pgdata:
  gitclones:
  gitlocks:
